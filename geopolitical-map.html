<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoStrategy Atlas | 地缘战略图谱</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg-primary: #0a0e17;
  --bg-secondary: #111827;
  --bg-tertiary: #1a2235;
  --accent-primary: #00d4aa;
  --accent-secondary: #0ea5e9;
  --accent-warning: #f59e0b;
  --accent-danger: #ef4444;
  --accent-purple: #a78bfa;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --border-color: #1e293b;
  --glow-primary: rgba(0,212,170,0.15);
  --glow-blue: rgba(14,165,233,0.12);
  --ocean-color: #0c1422;
  --land-color: #1a2744;
  --land-hover: #243656;
  --land-active: #2d4a6f;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans SC', 'DM Sans', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh; width: 100vw;
}

.app { display:grid; grid-template-columns:320px 1fr; grid-template-rows:52px 1fr 36px; height:100vh; }

/* ── TOP BAR ── */
.topbar {
  grid-column:1/-1; display:flex; align-items:center; justify-content:space-between;
  padding:0 18px; background:var(--bg-secondary); border-bottom:1px solid var(--border-color); z-index:100;
}
.logo { display:flex; align-items:center; gap:9px; }
.logo-ico { width:30px;height:30px;background:linear-gradient(135deg,var(--accent-primary),var(--accent-secondary));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px; }
.logo-txt { font-weight:700;font-size:14px;letter-spacing:.4px; }
.logo-txt span { color:var(--accent-primary); }
.topctrl { display:flex; align-items:center; gap:6px; }
.cb {
  background:var(--bg-tertiary);border:1px solid var(--border-color);color:var(--text-secondary);
  padding:5px 12px;border-radius:5px;cursor:pointer;font-size:11px;font-family:inherit;transition:all .2s;
  display:flex;align-items:center;gap:5px;white-space:nowrap;
}
.cb:hover { border-color:var(--accent-primary);color:var(--accent-primary); }
.cb.active { border-color:var(--accent-primary);color:var(--accent-primary);background:var(--glow-primary); }
.vtog { display:flex;background:var(--bg-tertiary);border-radius:5px;border:1px solid var(--border-color);overflow:hidden; }
.vtog button { background:0;border:0;color:var(--text-secondary);padding:5px 13px;cursor:pointer;font-size:11px;font-family:inherit;transition:all .2s; }
.vtog button.active { background:var(--accent-primary);color:var(--bg-primary);font-weight:600; }
.sbox { position:relative; }
.sbox input {
  background:var(--bg-tertiary);border:1px solid var(--border-color);color:var(--text-primary);
  padding:5px 10px 5px 28px;border-radius:5px;font-size:11px;font-family:inherit;width:180px;outline:0;transition:all .2s;
}
.sbox input:focus { border-color:var(--accent-primary);box-shadow:0 0 0 2px var(--glow-primary); }
.sbox::before { content:'⌕';position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px; }
.label-toggle { display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-secondary);cursor:pointer;user-select:none; }
.label-toggle input { accent-color:var(--accent-primary); }

/* ── SIDEBAR ── */
.sidebar { background:var(--bg-secondary);border-right:1px solid var(--border-color);overflow-y:auto;display:flex;flex-direction:column; }
.sidebar::-webkit-scrollbar{width:3px}.sidebar::-webkit-scrollbar-thumb{background:var(--border-color);border-radius:2px}
.sec { padding:14px;border-bottom:1px solid var(--border-color); }
.sec h3 { font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);margin-bottom:10px;display:flex;align-items:center;gap:5px; }
.tgrid { display:grid;grid-template-columns:1fr 1fr;gap:5px; }
.tb {
  background:var(--bg-tertiary);border:1px solid var(--border-color);color:var(--text-secondary);
  padding:9px 6px;border-radius:5px;cursor:pointer;font-size:10px;font-family:inherit;transition:all .2s;
  text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px;
}
.tb .ico { font-size:17px; }
.tb:hover { border-color:var(--accent-secondary);color:var(--accent-secondary); }
.tb.active { border-color:var(--accent-primary);color:var(--accent-primary);background:var(--glow-primary); }

/* Country panel */
.cpanel { display:none; }
.cpanel.vis { display:block; }
.chead { display:flex;align-items:center;gap:10px;margin-bottom:12px; }
.cflag { font-size:30px;line-height:1; }
.cname { font-size:17px;font-weight:700;line-height:1.2; }
.cname-sub { font-size:10px;color:var(--text-muted);font-weight:400; }
.sgrid { display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px; }
.scard { background:var(--bg-tertiary);border:1px solid var(--border-color);border-radius:7px;padding:8px; }
.slbl { font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px; }
.sval { font-size:15px;font-weight:700;color:var(--accent-primary);font-family:'JetBrains Mono',monospace;margin-top:1px; }
.sval.b{color:var(--accent-secondary)}.sval.y{color:var(--accent-warning)}.sval.p{color:var(--accent-purple)}
.tsec { margin-bottom:12px; }
.tsec h4 { font-size:11px;font-weight:600;margin-bottom:7px;display:flex;align-items:center;gap:5px; }
.tbar { display:flex;align-items:center;gap:6px;margin-bottom:5px;font-size:10px; }
.tbar-l { width:72px;flex-shrink:0;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.tbar-t { flex:1;height:5px;background:var(--bg-primary);border-radius:3px;overflow:hidden; }
.tbar-f { height:100%;border-radius:3px;transition:width .6s ease; }
.tbar-p { width:32px;text-align:right;color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:9px; }
.ef { background:linear-gradient(90deg,var(--accent-primary),#00b894); }
.if { background:linear-gradient(90deg,var(--accent-secondary),#3b82f6); }
.dtags { display:flex;flex-wrap:wrap;gap:3px; }
.dtag { background:var(--bg-tertiary);border:1px solid var(--border-color);color:var(--text-secondary);padding:2px 7px;border-radius:3px;font-size:9px;cursor:pointer;transition:all .2s; }
.dtag:hover{border-color:var(--accent-secondary);color:var(--accent-secondary)}
.dtag.ally{border-color:rgba(0,212,170,.3);color:var(--accent-primary)}
.dtag.rival{border-color:rgba(239,68,68,.3);color:var(--accent-danger)}
.dtag.partner{border-color:rgba(14,165,233,.3);color:var(--accent-secondary)}
.dtag.neighbor{border-color:rgba(245,158,11,.3);color:var(--accent-warning)}
.api-loading { display:flex;align-items:center;gap:6px;padding:8px 0;color:var(--text-muted);font-size:11px; }
.api-spin { width:14px;height:14px;border:2px solid var(--border-color);border-top-color:var(--accent-primary);border-radius:50%;animation:spin .8s linear infinite; }

/* Annotations */
.alist { max-height:180px;overflow-y:auto; }
.aitem { background:var(--bg-tertiary);border:1px solid var(--border-color);border-radius:5px;padding:7px 9px;margin-bottom:5px;font-size:10px;display:flex;justify-content:space-between;align-items:flex-start;gap:6px; }
.aitem .atxt { flex:1;color:var(--text-secondary);line-height:1.4; }
.aitem .atype { font-size:8px;color:var(--accent-warning);background:rgba(245,158,11,.1);padding:1px 5px;border-radius:2px;white-space:nowrap; }
.adel { background:0;border:0;color:var(--text-muted);cursor:pointer;font-size:13px;padding:0 2px;transition:color .2s; }
.adel:hover{color:var(--accent-danger)}
.clrbtn { width:100%;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--accent-danger);padding:7px;border-radius:5px;cursor:pointer;font-size:10px;font-family:inherit;margin-top:6px;transition:all .2s; }
.clrbtn:hover{background:rgba(239,68,68,.2)}

/* ── MAP ── */
.mapc { position:relative;overflow:hidden;background:var(--ocean-color); }
.mapc svg { width:100%;height:100%; }
.zctrl { position:absolute;bottom:18px;right:18px;display:flex;flex-direction:column;gap:3px;z-index:50; }
.zb { width:34px;height:34px;background:var(--bg-secondary);border:1px solid var(--border-color);color:var(--text-primary);border-radius:5px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all .2s; }
.zb:hover{border-color:var(--accent-primary);color:var(--accent-primary)}
.coords { position:absolute;bottom:18px;left:18px;background:rgba(17,24,39,.9);border:1px solid var(--border-color);padding:5px 10px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);z-index:50; }
.mmap { position:absolute;top:14px;right:14px;width:150px;height:84px;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:7px;overflow:hidden;z-index:50;opacity:.85; }
.mmap svg{width:100%;height:100%}
.ttip { position:absolute;background:rgba(17,24,39,.95);border:1px solid var(--border-color);padding:7px 11px;border-radius:7px;font-size:11px;pointer-events:none;z-index:200;backdrop-filter:blur(12px);box-shadow:0 8px 24px rgba(0,0,0,.4);display:none;max-width:200px; }
.ttip .tn{font-weight:700;margin-bottom:1px;color:var(--text-primary)}
.ttip .td{font-size:9px;color:var(--text-muted)}
.mleg { position:absolute;top:14px;left:14px;background:rgba(17,24,39,.9);border:1px solid var(--border-color);border-radius:7px;padding:9px 12px;font-size:9px;z-index:50;backdrop-filter:blur(8px);display:none; }
.mleg-t{font-weight:600;font-size:10px;margin-bottom:5px;color:var(--text-secondary)}
.mleg-i{display:flex;align-items:center;gap:5px;margin-bottom:2px;color:var(--text-muted)}
.mleg-d{width:7px;height:7px;border-radius:50%;flex-shrink:0}

.aover { position:absolute;z-index:150;display:none; }
.abox { background:var(--bg-secondary);border:1px solid var(--accent-primary);border-radius:7px;padding:9px;width:230px;box-shadow:0 8px 32px rgba(0,0,0,.5); }
.abox textarea { width:100%;background:var(--bg-tertiary);border:1px solid var(--border-color);color:var(--text-primary);border-radius:4px;padding:5px 7px;font-size:11px;font-family:inherit;resize:none;outline:0;height:55px;margin-bottom:5px; }
.abox select { width:100%;background:var(--bg-tertiary);border:1px solid var(--border-color);color:var(--text-primary);border-radius:4px;padding:3px 5px;font-size:10px;font-family:inherit;outline:0;margin-bottom:5px; }
.aacts { display:flex;gap:5px; }
.aacts button { flex:1;padding:4px;border-radius:4px;border:1px solid var(--border-color);font-size:10px;font-family:inherit;cursor:pointer;transition:all .2s; }
.asave { background:var(--accent-primary)!important;color:var(--bg-primary)!important;border-color:var(--accent-primary)!important;font-weight:600; }
.acancel { background:var(--bg-tertiary);color:var(--text-secondary); }

.loading-ov { position:absolute;inset:0;background:var(--bg-primary);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .5s; }
.loading-ov.hid{opacity:0;pointer-events:none}
.lspin{width:44px;height:44px;border:3px solid var(--border-color);border-top-color:var(--accent-primary);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}

.country-label { fill:rgba(255,255,255,.55);font-family:'Noto Sans SC','DM Sans',sans-serif;pointer-events:none;text-anchor:middle;dominant-baseline:central;paint-order:stroke;stroke:rgba(10,14,23,.8);stroke-width:2.5px;stroke-linejoin:round; }
.country-label.major { fill:rgba(255,255,255,.82);font-weight:600; }

.country-path { fill:var(--land-color);stroke:rgba(255,255,255,.12);stroke-width:.5;cursor:pointer;transition:fill .15s; }
.country-path:hover { fill:var(--land-hover); }
.country-path.selected { fill:var(--land-active);stroke:var(--accent-primary);stroke-width:1.2; }
.graticule { fill:none;stroke:rgba(255,255,255,.04);stroke-width:.5; }
.globe-outline { fill:none;stroke:rgba(255,255,255,.08);stroke-width:1.5; }
.sphere { fill:var(--ocean-color); }

.sbar { grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:var(--bg-secondary);border-top:1px solid var(--border-color);font-size:9px;color:var(--text-muted);font-family:'JetBrains Mono',monospace; }
.sbar-l,.sbar-r{display:flex;align-items:center;gap:14px}
.sdot{width:5px;height:5px;background:var(--accent-primary);border-radius:50%;display:inline-block;margin-right:3px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

@media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{display:none}.mmap{display:none}}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <div class="logo"><div class="logo-ico">🌐</div><div class="logo-txt"><span>Geo</span>Strategy Atlas</div></div>
  <div class="topctrl">
    <div class="sbox"><input type="text" id="searchInput" placeholder="搜索国家..."/></div>
    <div class="vtog"><button id="btn3d" class="active" onclick="setView('3d')">3D</button><button id="btn2d" onclick="setView('2d')">2D</button></div>
    <label class="label-toggle"><input type="checkbox" id="labelToggle" checked onchange="toggleLabels()"/><span data-i18n="labels">地名</span></label>
    <button class="cb" id="langBtn" onclick="toggleLang()">🌐 <span id="langLabel">EN</span></button>
    <button class="cb" id="annotateBtn" onclick="toggleTool('annotate')">📌 <span data-i18n="annotate">标注</span></button>
  </div>
</div>
<div class="sidebar" id="sidebar">
  <div class="sec">
    <h3>◈ <span data-i18n="mapLayers">地图图层</span></h3>
    <div class="tgrid">
      <button class="tb active" onclick="toggleLayer('countries')" id="layerCountries"><span class="ico">🗺️</span><span data-i18n="layerCountries">国家边界</span></button>
      <button class="tb" onclick="toggleLayer('graticule')" id="layerGraticule"><span class="ico">🔲</span><span data-i18n="layerGrid">经纬网格</span></button>
      <button class="tb" onclick="toggleLayer('capitals')" id="layerCapitals"><span class="ico">⭐</span><span data-i18n="layerCapitals">首都标注</span></button>
      <button class="tb" onclick="toggleLayer('disputes')" id="layerDisputes"><span class="ico">⚡</span><span data-i18n="layerDisputes">争议区域</span></button>
    </div>
  </div>
  <div class="sec">
    <h3>◈ <span data-i18n="analysisTools">分析工具</span></h3>
    <div class="tgrid">
      <button class="tb" onclick="toggleAnalysis('trade')"><span class="ico">📊</span><span data-i18n="tradeFlow">贸易流向</span></button>
      <button class="tb" onclick="toggleAnalysis('alliance')"><span class="ico">🤝</span><span data-i18n="allianceNet">同盟网络</span></button>
      <button class="tb" onclick="toggleAnalysis('gdp')"><span class="ico">💰</span><span data-i18n="gdpHeat">GDP热力</span></button>
      <button class="tb" onclick="toggleAnalysis('military')"><span class="ico">🎖️</span><span data-i18n="militaryPower">军事实力</span></button>
    </div>
  </div>
  <div class="sec cpanel" id="countryPanel">
    <h3>◈ <span data-i18n="countryInfo">国家信息</span></h3>
    <div class="chead"><div class="cflag" id="cFlag"></div><div><div class="cname" id="cName"></div><div class="cname-sub" id="cNameSub"></div></div></div>
    <div class="sgrid">
      <div class="scard"><div class="slbl">GDP (USD)</div><div class="sval" id="sGDP">—</div></div>
      <div class="scard"><div class="slbl" data-i18n="population">人口</div><div class="sval b" id="sPop">—</div></div>
      <div class="scard"><div class="slbl" data-i18n="area">面积(km²)</div><div class="sval y" id="sArea">—</div></div>
      <div class="scard"><div class="slbl" data-i18n="region">地区</div><div class="sval p" id="sRegion" style="font-size:12px">—</div></div>
    </div>
    <div class="tsec"><h4>ℹ️ <span data-i18n="basicInfo">基础信息</span></h4><div id="basicInfo"></div></div>
    <div class="tsec"><h4>📤 <span data-i18n="mainExports">主要出口</span></h4><div id="exportBars"></div></div>
    <div class="tsec"><h4>📥 <span data-i18n="mainImports">主要进口</span></h4><div id="importBars"></div></div>
    <div class="tsec"><h4>🤝 <span data-i18n="diplomacy">外交关系</span></h4><div class="dtags" id="diploTags"></div></div>
  </div>
  <div class="sec">
    <h3>◈ <span data-i18n="annotations">标注与笔记</span></h3>
    <div class="alist" id="annoList"><div style="text-align:center;color:var(--text-muted);font-size:10px;padding:14px 0"><span data-i18n="noAnnotations">暂无标注，点击地图添加</span></div></div>
    <button class="clrbtn" onclick="clearAllAnnotations()" id="clearBtn" style="display:none">🗑️ <span data-i18n="clearAll">一键清除所有标注</span></button>
  </div>
</div>
<div class="mapc" id="mapC">
  <div class="loading-ov" id="loadOv"><div class="lspin"></div><div style="font-size:12px;color:var(--text-secondary)" data-i18n="loading">正在加载地图数据...</div></div>
  <svg id="mapSvg"></svg>
  <div class="ttip" id="ttip"></div>
  <div class="aover" id="aOver"><div class="abox"><textarea id="aText" placeholder="输入标注内容..."></textarea><select id="aType"><option value="strategic">🎯 战略要点</option><option value="economic">💰 经济观察</option><option value="risk">⚠️ 风险提示</option><option value="note">📝 一般备注</option></select><div class="aacts"><button class="acancel" onclick="cancelAnno()">取消</button><button class="asave" onclick="saveAnno()">保存</button></div></div></div>
  <div class="mleg" id="mLeg"><div class="mleg-t" data-i18n="legendTitle">图例</div><div id="legC"></div></div>
  <div class="coords" id="coordD">0.00°N, 0.00°E</div>
  <div class="zctrl"><button class="zb" onclick="zoomIn()">+</button><button class="zb" onclick="zoomOut()">−</button><button class="zb" onclick="resetView()" style="font-size:11px">⌂</button></div>
  <div class="mmap" id="mmap"><svg id="mmSvg"></svg></div>
</div>
<div class="sbar">
  <div class="sbar-l"><span><span class="sdot"></span><span data-i18n="ready">就绪</span></span><span id="stCC">—</span><span id="stZ">Zoom: 1.0x</span></div>
  <div class="sbar-r"><span id="stAC">标注: 0</span><span>GeoStrategy Atlas v3.0</span></div>
</div>
</div>

<script>
/* ═══════════════════ STATE ═══════════════════ */
const S={lang:'zh',view:'3d',sel:null,tool:null,analysis:null,annos:[],
  layers:{countries:true,graticule:false,capitals:false,disputes:false},
  showLabels:true,rot:[0,-20,0],scale:1,wd:null,countries:null,apiCache:{}};

/* ═══════════════════ I18N ═══════════════════ */
const L={
  zh:{mapLayers:'地图图层',layerCountries:'国家边界',layerGrid:'经纬网格',layerCapitals:'首都标注',layerDisputes:'争议区域',analysisTools:'分析工具',tradeFlow:'贸易流向',allianceNet:'同盟网络',gdpHeat:'GDP热力',militaryPower:'军事实力',countryInfo:'国家信息',population:'人口',area:'面积(km²)',region:'地区',basicInfo:'基础信息',mainExports:'主要出口',mainImports:'主要进口',diplomacy:'外交关系',annotations:'标注与笔记',noAnnotations:'暂无标注，点击地图添加',clearAll:'一键清除所有标注',loading:'正在加载地图数据...',ready:'就绪',annotate:'标注',legendTitle:'图例',labels:'地名',searchPh:'搜索国家...',annoPh:'输入标注内容...',capital:'首都',currencies:'货币',languages:'语言',timezones:'时区',continent:'洲',loadingApi:'正在从API获取数据...',noData:'暂无详细贸易数据',annoCount:'标注',ally:'盟友',rival:'对手',partner:'伙伴',neighbor:'邻国'},

/* ═══════════════════ MAP GLOBALS ═══════════════════ */
let svg,g,labelG,proj,path,zoomB,mmSvg,mmProj,mmPath,W,H;

/* ═══════════════════ API ═══════════════════ */
async function fetchAPI(a3){
  if(S.apiCache[a3])return S.apiCache[a3];
  try{
    const r=await fetch(`https://restcountries.com/v3.1/alpha/${a3}?fields=name,capital,currencies,languages,flag,population,area,region,subregion,timezones,borders,latlng,cca2,cca3`);
    if(!r.ok)return null;
    const d=await r.json(); S.apiCache[a3]=d; return d;
  }catch(e){return null;}
}

/* ═══════════════════ INIT ═══════════════════ */
function initMap(){
  const c=document.getElementById('mapC'); W=c.clientWidth;H=c.clientHeight;
  svg=d3.select('#mapSvg').attr('width',W).attr('height',H);
  proj=d3.geoOrthographic().scale(Math.min(W,H)/2.3).translate([W/2,H/2]).rotate(S.rot).clipAngle(90);
  path=d3.geoPath().projection(proj);
  svg.append('defs').html('<radialGradient id="oG" cx="50%" cy="50%" r="50%"><stop offset="0%" style="stop-color:#0f1d33"/><stop offset="100%" style="stop-color:#0a0e17"/></radialGradient><filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>');
  g=svg.append('g');
  g.append('path').datum({type:'Sphere'}).attr('class','sphere').attr('d',path).style('fill','url(#oG)');
  g.append('path').datum(d3.geoGraticule()()).attr('class','graticule').attr('d',path).style('display','none');
  g.append('path').datum({type:'Sphere'}).attr('class','globe-outline').attr('d',path);
  labelG=svg.append('g').attr('class','lbl-g');
  mmSvg=d3.select('#mmSvg');
  mmProj=d3.geoNaturalEarth1().scale(26).translate([75,44]);
  mmPath=d3.geoPath().projection(mmProj);
  mmSvg.append('rect').attr('width',150).attr('height',84).attr('fill','#0c1422');
  loadWorld(); setupInteract(); setupSearch();
}

async function loadWorld(){
  try{
    const data=await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    S.wd=data; S.countries=topojson.feature(data,data.objects.countries);
    renderC(); renderLabels(); renderMM();
    document.getElementById('loadOv').classList.add('hid');
    document.getElementById('stCC').textContent=S.lang==='zh'?`${S.countries.features.length} 个国家/地区`:`${S.countries.features.length} Countries`;
  }catch(e){document.getElementById('loadOv').innerHTML='<div style="color:var(--accent-danger)">地图加载失败，请刷新</div>';}
}

function renderC(){
  g.selectAll('.country-path').remove();
  g.selectAll('.country-path').data(S.countries.features).enter().append('path')
    .attr('class','country-path').attr('d',path).attr('data-id',d=>d.id)
    .on('click',function(ev,d){if(S.tool==='annotate'){showAnnoInput(ev);return;}selectCountry(d,this);})
    .on('mousemove',function(ev,d){showTip(ev,d);}).on('mouseout',hideTip);
  renderAnnoM();
  g.select('.globe-outline').attr('d',path);g.select('.sphere').attr('d',path);g.select('.graticule').attr('d',path);
}

function renderLabels(){
  labelG.selectAll('*').remove();
  if(!S.showLabels||!S.countries)return;
  S.countries.features.forEach(f=>{
    const id=f.id,nm=S.lang==='zh'?(ZH[id]||''):(EN[id]||'');
    if(!nm)return;
    const ct=d3.geoCentroid(f),pos=proj(ct);
    if(!pos)return;
    if(S.view==='3d'){if(d3.geoDistance(ct,[-proj.rotate()[0],-proj.rotate()[1]])>Math.PI/2)return;}
    const maj=MAJOR.has(id);
    if(S.view==='3d'&&!maj&&S.scale<1.5)return;
    if(S.view==='2d'&&!maj&&S.scale<1.2)return;
    let fs=maj?10:7.5;
    if(S.view==='2d')fs=Math.min(maj?10/Math.max(S.scale*.7,0.4):7.5/Math.max(S.scale*.7,0.4),16);
    labelG.append('text').attr('class','country-label'+(maj?' major':'')).attr('x',pos[0]).attr('y',pos[1])
      .attr('data-lng',ct[0]).attr('data-lat',ct[1]).style('font-size',fs+'px').text(nm);
  });
}

function renderMM(){
  if(!S.countries)return;
  mmSvg.selectAll('.mc').remove();
  mmSvg.selectAll('.mc').data(S.countries.features).enter().append('path')
    .attr('class','mc').attr('d',mmPath).attr('fill','#1a2744').attr('stroke','rgba(255,255,255,.08)').attr('stroke-width',.3);
}

/* ═══════════════════ INTERACTIONS ═══════════════════ */
function setupInteract(){
  let ds=null,dr=null;
  svg.call(d3.drag()
    .on('start',ev=>{if(S.view!=='3d')return;ds=[ev.x,ev.y];dr=[...proj.rotate()];})
    .on('drag',ev=>{if(S.view!=='3d'||!ds)return;const s=.4;const nr=[dr[0]+(ev.x-ds[0])*s,Math.max(-90,Math.min(90,dr[1]-(ev.y-ds[1])*s)),dr[2]];S.rot=nr;proj.rotate(nr);updateAll();})
    .on('end',()=>{ds=null;})
  );
  zoomB=d3.zoom().scaleExtent([0.5,12]).on('zoom',ev=>{
    S.scale=ev.transform.k;
    if(S.view==='2d'){g.attr('transform',ev.transform);labelG.attr('transform',ev.transform);renderLabels();}
    else{proj.scale(Math.min(W,H)/2.3*ev.transform.k);updateAll();}
    document.getElementById('stZ').textContent=`Zoom: ${S.scale.toFixed(1)}x`;
  });
  svg.call(zoomB);
  svg.on('mousemove',ev=>{
    const[x,y]=d3.pointer(ev);let co;
    if(S.view==='2d'){const t=d3.zoomTransform(svg.node());co=proj.invert([(x-t.x)/t.k,(y-t.y)/t.k]);}
    else co=proj.invert([x,y]);
    if(co)document.getElementById('coordD').textContent=`${Math.abs(co[1].toFixed(2))}°${co[1]>=0?'N':'S'}, ${Math.abs(co[0].toFixed(2))}°${co[0]>=0?'E':'W'}`;
  });
}

function updateAll(){
  g.selectAll('.country-path').attr('d',path);
  g.select('.graticule').attr('d',path);g.select('.globe-outline').attr('d',path);g.select('.sphere').attr('d',path);
  renderLabels();
  g.selectAll('.cap-dot,.cap-lbl,.anno-marker,.disp-c').each(function(){
    const el=d3.select(this),co=[+el.attr('data-lng'),+el.attr('data-lat')],p=proj(co);
    if(!p)return;
    if(S.view==='3d'){const dd=d3.geoDistance(co,[-proj.rotate()[0],-proj.rotate()[1]]);el.style('display',dd>Math.PI/2?'none':'block');}
    if(this.tagName==='circle')el.attr('cx',p[0]).attr('cy',p[1]);
    else if(this.tagName==='text')el.attr('x',p[0]+5).attr('y',p[1]+3);
  });
}

  if(S.view==='3d'){const ct=d3.geoCentroid(d),tr=[-ct[0],-ct[1],0],cr=proj.rotate();d3.transition().duration(700).tween('r',()=>{const r=d3.interpolate(cr,tr);return t=>{proj.rotate(r(t));S.rot=r(t);updateAll();};});}
  // API
  const a3=N2A[d.id];let api=null;if(a3)api=await fetchAPI(a3);

    document.getElementById('sGDP').textContent='—';
    const cap=api.capital?api.capital.join(', '):'—';
    const cur=api.currencies?Object.values(api.currencies).map(c=>c.name+(c.symbol?' ('+c.symbol+')':'')).join(', '):'—';
    const lng=api.languages?Object.values(api.languages).join(', '):'—';
    const tz=api.timezones?api.timezones.slice(0,3).join(', ')+(api.timezones.length>3?' ...':''):'—';

      <div><span style="color:var(--text-muted)">${L[S.lang].continent}:</span> ${S.lang==='zh'?rZh(api.region):api.region}</div></div>`;
  } else {
    document.getElementById('cFlag').textContent='🏳️';['sGDP','sPop','sArea','sRegion'].forEach(x=>document.getElementById(x).textContent='—');
    document.getElementById('basicInfo').innerHTML=`<div style="font-size:10px;color:var(--text-muted)">${S.lang==='zh'?'API数据不可用':'API unavailable'}</div>`;
  }
  const od=OD[d.id];

}

/* ═══════════════════ SEARCH ═══════════════════ */
function setupSearch(){const inp=document.getElementById('searchInput');inp.addEventListener('input',function(){const q=this.value.trim().toLowerCase();if(!q)return;for(const[id,nm]of Object.entries(ZH)){const en=(EN[id]||'').toLowerCase();if(nm.includes(q)||en.includes(q)){const el=g.select(`[data-id="${id}"]`);if(!el.empty()){selectCountry(el.datum(),el.node());this.blur();return;}}}});inp.addEventListener('keydown',function(e){if(e.key==='Enter'){const ev=new Event('input');this.dispatchEvent(ev);}});}

/* ═══════════════════ RESIZE ═══════════════════ */
window.addEventListener('resize',()=>{const c=document.getElementById('mapC');W=c.clientWidth;H=c.clientHeight;svg.attr('width',W).attr('height',H);proj.translate([W/2,H/2]);if(S.view==='3d')proj.scale(Math.min(W,H)/2.3*S.scale);else proj.scale(Math.min(W,H)/3.5);path=d3.geoPath().projection(proj);if(S.countries){renderC();renderLabels();}});

/* ═══════════════════ BOOT ═══════════════════ */
window.addEventListener('DOMContentLoaded',()=>{initMap();loadAS();});
</script>
</body>
</html>
