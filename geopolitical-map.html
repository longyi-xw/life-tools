<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GeoStrategy Atlas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg0:#0a0e17;--bg1:#111827;--bg2:#1a2235;--a1:#00d4aa;--a2:#0ea5e9;--aw:#f59e0b;--ad:#ef4444;--ap:#a78bfa;--t1:#e2e8f0;--t2:#94a3b8;--t3:#64748b;--bc:#1e293b;--ocean:#0c1422;--land:#1a2744;--lh:#243656;--la:#2d4a6f;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC','DM Sans',sans-serif;background:var(--bg0);color:var(--t1);overflow:hidden;height:100vh;height:100dvh;width:100vw;touch-action:none}

/* ═══ LAYOUT ═══ */
.app{display:grid;grid-template-columns:300px 1fr;grid-template-rows:48px 1fr 32px;height:100vh;height:100dvh}

/* ═══ TOPBAR ═══ */
.topbar{grid-column:1/-1;display:flex;align-items:center;gap:8px;padding:0 12px;background:var(--bg1);border-bottom:1px solid var(--bc);z-index:100;overflow-x:auto;-webkit-overflow-scrolling:touch}
.topbar::-webkit-scrollbar{display:none}
.menu-btn{display:none;background:0;border:0;color:var(--t1);font-size:20px;cursor:pointer;padding:4px 8px;flex-shrink:0}
.logo{display:flex;align-items:center;gap:7px;flex-shrink:0}
.logo-i{width:28px;height:28px;background:linear-gradient(135deg,var(--a1),var(--a2));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px}
.logo-t{font-weight:700;font-size:13px;letter-spacing:.3px;white-space:nowrap}.logo-t span{color:var(--a1)}
.spacer{flex:1;min-width:4px}
.cb{background:var(--bg2);border:1px solid var(--bc);color:var(--t2);padding:4px 10px;border-radius:5px;cursor:pointer;font-size:10px;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0}
.cb:hover,.cb.active{border-color:var(--a1);color:var(--a1)}
.cb.active{background:rgba(0,212,170,.1)}
.vtog{display:flex;background:var(--bg2);border-radius:5px;border:1px solid var(--bc);overflow:hidden;flex-shrink:0}
.vtog button{background:0;border:0;color:var(--t2);padding:4px 11px;cursor:pointer;font-size:10px;font-family:inherit;transition:all .15s}
.vtog button.active{background:var(--a1);color:var(--bg0);font-weight:600}
.sbox{position:relative;flex-shrink:0}
.sbox input{background:var(--bg2);border:1px solid var(--bc);color:var(--t1);padding:4px 8px 4px 26px;border-radius:5px;font-size:10px;font-family:inherit;width:140px;outline:0;transition:all .2s}
.sbox input:focus{border-color:var(--a1);width:170px}
.sbox::before{content:'⌕';position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:12px}
.ltog{display:flex;align-items:center;gap:3px;font-size:9px;color:var(--t2);cursor:pointer;user-select:none;flex-shrink:0}
.ltog input{accent-color:var(--a1);width:14px;height:14px}

/* ═══ SIDEBAR ═══ */
.sidebar{background:var(--bg1);border-right:1px solid var(--bc);overflow-y:auto;display:flex;flex-direction:column;z-index:90;transition:transform .3s ease}
.sidebar::-webkit-scrollbar{width:3px}.sidebar::-webkit-scrollbar-thumb{background:var(--bc);border-radius:2px}
.sec{padding:12px;border-bottom:1px solid var(--bc)}
.sec h3{font-size:9px;text-transform:uppercase;letter-spacing:1.4px;color:var(--t3);margin-bottom:8px;display:flex;align-items:center;gap:4px}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.tb{background:var(--bg2);border:1px solid var(--bc);color:var(--t2);padding:8px 4px;border-radius:5px;cursor:pointer;font-size:9px;font-family:inherit;transition:all .15s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px}
.tb .ico{font-size:16px}.tb:hover{border-color:var(--a2);color:var(--a2)}.tb.active{border-color:var(--a1);color:var(--a1);background:rgba(0,212,170,.08)}

.cpanel{display:none}.cpanel.vis{display:block}
.chead{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.cflag{font-size:28px;line-height:1}.cname{font-size:15px;font-weight:700;line-height:1.2}.cname-sub{font-size:9px;color:var(--t3)}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px}
.scard{background:var(--bg2);border:1px solid var(--bc);border-radius:6px;padding:7px}
.slbl{font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.3px}
.sval{font-size:14px;font-weight:700;color:var(--a1);font-family:'JetBrains Mono',monospace;margin-top:1px}
.sval.b{color:var(--a2)}.sval.y{color:var(--aw)}.sval.p{color:var(--ap)}
.tsec{margin-bottom:10px}.tsec h4{font-size:10px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.tbar{display:flex;align-items:center;gap:5px;margin-bottom:4px;font-size:9px}
.tbar-l{width:65px;flex-shrink:0;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbar-t{flex:1;height:4px;background:var(--bg0);border-radius:2px;overflow:hidden}
.tbar-f{height:100%;border-radius:2px;transition:width .5s}.tbar-p{width:28px;text-align:right;color:var(--t3);font-family:'JetBrains Mono',monospace;font-size:8px}
.ef{background:linear-gradient(90deg,var(--a1),#00b894)}.if{background:linear-gradient(90deg,var(--a2),#3b82f6)}
.dtags{display:flex;flex-wrap:wrap;gap:3px}
.dtag{background:var(--bg2);border:1px solid var(--bc);color:var(--t2);padding:2px 6px;border-radius:3px;font-size:8px;transition:all .15s}
.dtag.ally{border-color:rgba(0,212,170,.3);color:var(--a1)}.dtag.rival{border-color:rgba(239,68,68,.3);color:var(--ad)}.dtag.partner{border-color:rgba(14,165,233,.3);color:var(--a2)}.dtag.neighbor{border-color:rgba(245,158,11,.3);color:var(--aw)}
.api-ld{display:flex;align-items:center;gap:5px;padding:6px 0;color:var(--t3);font-size:10px}
.api-sp{width:12px;height:12px;border:2px solid var(--bc);border-top-color:var(--a1);border-radius:50%;animation:spin .7s linear infinite}
.alist{max-height:160px;overflow-y:auto}
.aitem{background:var(--bg2);border:1px solid var(--bc);border-radius:4px;padding:6px 8px;margin-bottom:4px;font-size:9px;display:flex;align-items:flex-start;gap:5px}
.aitem .atxt{flex:1;color:var(--t2);line-height:1.4}.aitem .atype{font-size:7px;color:var(--aw);background:rgba(245,158,11,.1);padding:1px 4px;border-radius:2px;white-space:nowrap}
.adel{background:0;border:0;color:var(--t3);cursor:pointer;font-size:12px;padding:0 2px}.adel:hover{color:var(--ad)}
.clrbtn{width:100%;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:var(--ad);padding:6px;border-radius:4px;cursor:pointer;font-size:9px;font-family:inherit;margin-top:5px}

/* ═══ MAP ═══ */
.mapc{position:relative;overflow:hidden;background:var(--ocean);touch-action:none}
.mapc svg{width:100%;height:100%;touch-action:none}
.zctrl{position:absolute;bottom:14px;right:14px;display:flex;flex-direction:column;gap:3px;z-index:50}
.zb{width:36px;height:36px;background:var(--bg1);border:1px solid var(--bc);color:var(--t1);border-radius:6px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.zb:hover{border-color:var(--a1);color:var(--a1)}
.coords{position:absolute;bottom:14px;left:14px;background:rgba(17,24,39,.88);border:1px solid var(--bc);padding:4px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3);z-index:50}
.mmap{position:absolute;top:10px;right:10px;width:130px;height:72px;background:var(--bg1);border:1px solid var(--bc);border-radius:6px;overflow:hidden;z-index:50;opacity:.8}
.mmap svg{width:100%;height:100%}
.ttip{position:absolute;background:rgba(17,24,39,.95);border:1px solid var(--bc);padding:6px 10px;border-radius:6px;font-size:10px;pointer-events:none;z-index:200;backdrop-filter:blur(10px);box-shadow:0 6px 20px rgba(0,0,0,.4);display:none;max-width:180px}
.ttip .tn{font-weight:700;color:var(--t1)}.ttip .td{font-size:8px;color:var(--t3)}
.mleg{position:absolute;top:10px;left:10px;background:rgba(17,24,39,.88);border:1px solid var(--bc);border-radius:6px;padding:8px 10px;font-size:8px;z-index:50;display:none}
.mleg-t{font-weight:600;font-size:9px;margin-bottom:4px;color:var(--t2)}.mleg-i{display:flex;align-items:center;gap:4px;margin-bottom:2px;color:var(--t3)}.mleg-d{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.aover{position:absolute;z-index:150;display:none}
.abox{background:var(--bg1);border:1px solid var(--a1);border-radius:6px;padding:8px;width:220px;box-shadow:0 6px 24px rgba(0,0,0,.5)}
.abox textarea{width:100%;background:var(--bg2);border:1px solid var(--bc);color:var(--t1);border-radius:3px;padding:4px 6px;font-size:10px;font-family:inherit;resize:none;outline:0;height:50px;margin-bottom:4px}
.abox select{width:100%;background:var(--bg2);border:1px solid var(--bc);color:var(--t1);border-radius:3px;padding:3px 4px;font-size:9px;font-family:inherit;outline:0;margin-bottom:4px}
.aacts{display:flex;gap:4px}.aacts button{flex:1;padding:4px;border-radius:3px;border:1px solid var(--bc);font-size:9px;font-family:inherit;cursor:pointer}
.asave{background:var(--a1)!important;color:var(--bg0)!important;border-color:var(--a1)!important;font-weight:600}.acancel{background:var(--bg2);color:var(--t2)}
.lov{position:absolute;inset:0;background:var(--bg0);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .5s}
.lov.hid{opacity:0;pointer-events:none}
.lsp{width:40px;height:40px;border:3px solid var(--bc);border-top-color:var(--a1);border-radius:50%;animation:spin .9s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.country-label{fill:rgba(255,255,255,.5);font-family:'Noto Sans SC','DM Sans',sans-serif;pointer-events:none;text-anchor:middle;dominant-baseline:central;paint-order:stroke;stroke:rgba(10,14,23,.85);stroke-width:2.5px;stroke-linejoin:round}
.country-label.major{fill:rgba(255,255,255,.8);font-weight:600}
.country-path{fill:var(--land);stroke:rgba(255,255,255,.1);stroke-width:.4;cursor:pointer;transition:fill .12s}
.country-path:hover{fill:var(--lh)}.country-path.selected{fill:var(--la);stroke:var(--a1);stroke-width:1}
.graticule{fill:none;stroke:rgba(255,255,255,.035);stroke-width:.4}
.globe-outline{fill:none;stroke:rgba(255,255,255,.07);stroke-width:1.2}
.sphere{fill:var(--ocean)}

/* ═══ STATUS ═══ */
.sbar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:var(--bg1);border-top:1px solid var(--bc);font-size:8px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.sbar-l,.sbar-r{display:flex;align-items:center;gap:10px}
.sdot{width:4px;height:4px;background:var(--a1);border-radius:50%;display:inline-block;margin-right:3px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Mobile overlay for sidebar */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:85}

/* ═══ MOBILE ═══ */
@media(max-width:768px){
  .app{grid-template-columns:1fr;grid-template-rows:48px 1fr 32px}
  .menu-btn{display:flex}
  .sidebar{position:fixed;left:0;top:48px;bottom:32px;width:280px;transform:translateX(-100%);z-index:90}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .sbox input{width:100px}
  .sbox input:focus{width:120px}
  .mmap{width:100px;height:56px;top:8px;right:8px}
  .zctrl{bottom:10px;right:10px}
  .zb{width:40px;height:40px;font-size:20px}
  .coords{font-size:8px;padding:3px 6px;bottom:10px;left:8px}
  .ttip{font-size:9px;max-width:160px}
  .logo-t{display:none}
  .abox{width:200px}
}
@media(max-width:400px){
  .cb{padding:3px 6px;font-size:9px}
  .vtog button{padding:3px 8px;font-size:9px}
  .sbox{display:none}
}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <button class="menu-btn" id="menuBtn" onclick="toggleSidebar()">☰</button>
  <div class="logo"><div class="logo-i">🌐</div><div class="logo-t"><span>Geo</span>Strategy</div></div>
  <div class="spacer"></div>
  <div class="sbox"><input type="text" id="searchInput" placeholder="搜索国家..."/></div>
  <div class="vtog"><button id="btn3d" class="active" onclick="setView('3d')">3D</button><button id="btn2d" onclick="setView('2d')">2D</button></div>
  <label class="ltog"><input type="checkbox" id="labelTog" checked onchange="toggleLabels()"/><span data-i18n="labels">地名</span></label>
  <button class="cb" onclick="toggleLang()">🌐 <span id="langLbl">EN</span></button>
  <button class="cb" id="annotateBtn" onclick="toggleTool('annotate')">📌 <span data-i18n="annotate">标注</span></button>
</div>
<div class="sidebar-overlay" id="sidebarOv" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
  <div class="sec"><h3>◈ <span data-i18n="mapLayers">地图图层</span></h3><div class="tgrid">
    <button class="tb active" onclick="toggleLayer('countries')" id="layerCountries"><span class="ico">🗺️</span><span data-i18n="layerCountries">国家边界</span></button>
    <button class="tb" onclick="toggleLayer('graticule')" id="layerGraticule"><span class="ico">🔲</span><span data-i18n="layerGrid">经纬网格</span></button>
    <button class="tb" onclick="toggleLayer('capitals')" id="layerCapitals"><span class="ico">⭐</span><span data-i18n="layerCapitals">首都标注</span></button>
    <button class="tb" onclick="toggleLayer('disputes')" id="layerDisputes"><span class="ico">⚡</span><span data-i18n="layerDisputes">争议区域</span></button>
  </div></div>
  <div class="sec"><h3>◈ <span data-i18n="analysisTools">分析工具</span></h3><div class="tgrid">
    <button class="tb" onclick="toggleAnalysis('trade')"><span class="ico">📊</span><span data-i18n="tradeFlow">贸易流向</span></button>
    <button class="tb" onclick="toggleAnalysis('alliance')"><span class="ico">🤝</span><span data-i18n="allianceNet">同盟网络</span></button>
    <button class="tb" onclick="toggleAnalysis('gdp')"><span class="ico">💰</span><span data-i18n="gdpHeat">GDP热力</span></button>
    <button class="tb" onclick="toggleAnalysis('military')"><span class="ico">🎖️</span><span data-i18n="militaryPower">军事实力</span></button>
  </div></div>
  <div class="sec cpanel" id="cPanel"><h3>◈ <span data-i18n="countryInfo">国家信息</span></h3>
    <div class="chead"><div class="cflag" id="cFlag"></div><div><div class="cname" id="cName"></div><div class="cname-sub" id="cNameSub"></div></div></div>
    <div class="sgrid"><div class="scard"><div class="slbl">GDP</div><div class="sval" id="sGDP">—</div></div><div class="scard"><div class="slbl" data-i18n="population">人口</div><div class="sval b" id="sPop">—</div></div><div class="scard"><div class="slbl" data-i18n="area">面积km²</div><div class="sval y" id="sArea">—</div></div><div class="scard"><div class="slbl" data-i18n="region">地区</div><div class="sval p" id="sReg" style="font-size:11px">—</div></div></div>
    <div class="tsec"><h4>ℹ️ <span data-i18n="basicInfo">基础信息</span></h4><div id="bInfo"></div></div>
    <div class="tsec"><h4>📤 <span data-i18n="mainExports">主要出口</span></h4><div id="exBars"></div></div>
    <div class="tsec"><h4>📥 <span data-i18n="mainImports">主要进口</span></h4><div id="imBars"></div></div>
    <div class="tsec"><h4>🤝 <span data-i18n="diplomacy">外交关系</span></h4><div class="dtags" id="dpTags"></div></div>
  </div>
  <div class="sec"><h3>◈ <span data-i18n="annotations">标注与笔记</span></h3>
    <div class="alist" id="aList"><div style="text-align:center;color:var(--t3);font-size:9px;padding:12px 0"><span data-i18n="noAnnotations">暂无标注</span></div></div>
    <button class="clrbtn" onclick="clearAnnos()" id="clrBtn" style="display:none">🗑️ <span data-i18n="clearAll">一键清除所有标注</span></button>
  </div>
</div>
<div class="mapc" id="mapC">
  <div class="lov" id="lov"><div class="lsp"></div><div style="font-size:11px;color:var(--t2)" data-i18n="loading">加载地图数据...</div></div>
  <svg id="mapSvg"></svg>
  <div class="ttip" id="ttip"></div>
  <div class="aover" id="aOv"><div class="abox"><textarea id="aTxt" placeholder="输入标注内容..."></textarea><select id="aTp"><option value="strategic">🎯 战略要点</option><option value="economic">💰 经济观察</option><option value="risk">⚠️ 风险提示</option><option value="note">📝 一般备注</option></select><div class="aacts"><button class="acancel" onclick="cancelA()">取消</button><button class="asave" onclick="saveA()">保存</button></div></div></div>
  <div class="mleg" id="mLeg"><div class="mleg-t" data-i18n="legendTitle">图例</div><div id="legC"></div></div>
  <div class="coords" id="coordD">0.00°N, 0.00°E</div>
  <div class="zctrl"><button class="zb" onclick="doZoom(1.5)">+</button><button class="zb" onclick="doZoom(0.67)">−</button><button class="zb" onclick="resetV()" style="font-size:12px">⌂</button></div>
  <div class="mmap" id="mmap"><svg id="mmSvg"></svg></div>
</div>
<div class="sbar"><div class="sbar-l"><span><span class="sdot"></span><span data-i18n="ready">就绪</span></span><span id="stCC">—</span><span id="stZ">1.0x</span></div><div class="sbar-r"><span id="stA">0</span><span>v4.0</span></div></div>
</div>

<script>
/* ═══════ STATE ═══════ */
const S={lang:'zh',view:'3d',sel:null,tool:null,ana:null,annos:[],
  layers:{countries:1,graticule:0,capitals:0,disputes:0},
  showLbl:1,rot:[0,-20,0],scale:1,wd:null,ct:null,apiC:{}};
const isMobile=()=>window.innerWidth<=768;

/* ═══════ I18N ═══════ */
const I={
  zh:{mapLayers:'地图图层',layerCountries:'国家边界',layerGrid:'经纬网格',layerCapitals:'首都标注',layerDisputes:'争议区域',analysisTools:'分析工具',tradeFlow:'贸易流向',allianceNet:'同盟网络',gdpHeat:'GDP热力',militaryPower:'军事实力',countryInfo:'国家信息',population:'人口',area:'面积km²',region:'地区',basicInfo:'基础信息',mainExports:'主要出口',mainImports:'主要进口',diplomacy:'外交关系',annotations:'标注与笔记',noAnnotations:'暂无标注',clearAll:'一键清除所有标注',loading:'加载地图数据...',ready:'就绪',annotate:'标注',legendTitle:'图例',labels:'地名',searchPh:'搜索国家...',capital:'首都',currencies:'货币',languages:'语言',timezones:'时区',continent:'洲',ldApi:'获取API数据...',noData:'暂无贸易数据',ally:'盟友',rival:'对手',partner:'伙伴',neighbor:'邻国'},
  en:{mapLayers:'Map Layers',layerCountries:'Borders',layerGrid:'Graticule',layerCapitals:'Capitals',layerDisputes:'Disputes',analysisTools:'Analysis',tradeFlow:'Trade',allianceNet:'Alliances',gdpHeat:'GDP',militaryPower:'Military',countryInfo:'Country Info',population:'Population',area:'Area km²',region:'Region',basicInfo:'Basic Info',mainExports:'Exports',mainImports:'Imports',diplomacy:'Diplomacy',annotations:'Notes',noAnnotations:'No annotations',clearAll:'Clear All',loading:'Loading...',ready:'Ready',annotate:'Pin',legendTitle:'Legend',labels:'Labels',searchPh:'Search...',capital:'Capital',currencies:'Currency',languages:'Languages',timezones:'Timezone',continent:'Continent',ldApi:'Fetching...',noData:'No trade data',ally:'Ally',rival:'Rival',partner:'Partner',neighbor:'Neighbor'}

/* ═══════ MAP ═══════ */
let svg,g,lblG,proj,path,zoomB,mmSvg,mmP,mmPh,W,H;

/* KEY FIX: We use a single zoom behavior for BOTH 2D and 3D.
   In 3D: zoom = scale projection; "pan" part of zoom is IGNORED, rotation is separate.
   In 2D: zoom = transform g (both pan AND scale work naturally).
   We do NOT use d3.drag() at all — we use pointer events for globe rotation. */

let rotDrag=null, rotStart=null;

function initMap(){
  const c=document.getElementById('mapC');W=c.clientWidth;H=c.clientHeight;
  svg=d3.select('#mapSvg').attr('width',W).attr('height',H);
  proj=d3.geoOrthographic().scale(Math.min(W,H)/2.3).translate([W/2,H/2]).rotate(S.rot).clipAngle(90);
  path=d3.geoPath().projection(proj);
  svg.append('defs').html('<radialGradient id="oG" cx="50%" cy="50%" r="50%"><stop offset="0%" style="stop-color:#0f1d33"/><stop offset="100%" style="stop-color:#0a0e17"/></radialGradient><filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>');
  g=svg.append('g');
  g.append('path').datum({type:'Sphere'}).attr('class','sphere').attr('d',path).style('fill','url(#oG)');
  g.append('path').datum(d3.geoGraticule()()).attr('class','graticule').attr('d',path).style('display','none');
  g.append('path').datum({type:'Sphere'}).attr('class','globe-outline').attr('d',path);
  lblG=svg.append('g');
  mmSvg=d3.select('#mmSvg');mmP=d3.geoNaturalEarth1().scale(22).translate([65,38]);mmPh=d3.geoPath().projection(mmP);
  mmSvg.append('rect').attr('width',130).attr('height',72).attr('fill','#0c1422');
  loadWorld();setupZoom();setupSearch();
}

async function loadWorld(){
  try{
    const d=await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    S.wd=d;S.ct=topojson.feature(d,d.objects.countries);
    renderC();renderLbl();renderMM();
    document.getElementById('lov').classList.add('hid');
    updCC();
  }catch(e){document.getElementById('lov').innerHTML='<div style="color:var(--ad)">加载失败</div>';}
}

function renderC(){
  g.selectAll('.country-path').remove();
  g.selectAll('.country-path').data(S.ct.features).enter().append('path')
    .attr('class','country-path').attr('d',path).attr('data-id',d=>d.id)
    .on('click',function(ev,d){ev.stopPropagation();if(S.tool==='annotate'){showAI(ev);return;}selC(d,this);})
    .on('mousemove',function(ev,d){showTip(ev,d);}).on('mouseout',hideTip);
  renderAM();
  g.select('.globe-outline').attr('d',path);g.select('.sphere').attr('d',path);g.select('.graticule').attr('d',path);
}

function renderLbl(){
  lblG.selectAll('*').remove();
  if(!S.showLbl||!S.ct)return;
  S.ct.features.forEach(f=>{
    const id=f.id,nm=S.lang==='zh'?(ZH[id]||''):(EN[id]||'');if(!nm)return;
    const ct=d3.geoCentroid(f),pos=proj(ct);if(!pos)return;
    if(S.view==='3d'&&d3.geoDistance(ct,[-proj.rotate()[0],-proj.rotate()[1]])>Math.PI/2)return;
    const mj=MAJ.has(id);
    if(S.view==='3d'&&!mj&&S.scale<1.5)return;
    if(S.view==='2d'&&!mj&&S.scale<1.2)return;
    let fs=mj?10:7;
    if(S.view==='2d')fs=Math.min((mj?10:7)/Math.max(S.scale*.65,.35),16);
    lblG.append('text').attr('class','country-label'+(mj?' major':'')).attr('x',pos[0]).attr('y',pos[1])
      .attr('data-lng',ct[0]).attr('data-lat',ct[1]).style('font-size',fs+'px').text(nm);
  });
}

function renderMM(){if(!S.ct)return;mmSvg.selectAll('.mc').remove();mmSvg.selectAll('.mc').data(S.ct.features).enter().append('path').attr('class','mc').attr('d',mmPh).attr('fill','#1a2744').attr('stroke','rgba(255,255,255,.06)').attr('stroke-width',.2);}

/* ═══════ ZOOM + ROTATION (THE FIX) ═══════ */
function setupZoom(){
  /* Zoom handles both pan (2D) and scale (both modes) */
  zoomB=d3.zoom().scaleExtent([0.5,12])
    .filter(ev=>{
      /* In 3D, block pan (translate) from zoom — only allow wheel/pinch for scale */
      if(S.view==='3d'){
        // Allow wheel, pinch (touch with 2+ fingers), and dblclick
        if(ev.type==='wheel')return true;
        if(ev.type==='dblclick')return true;
        if(ev.touches&&ev.touches.length>=2)return true;
        return false; // Block single-finger/mouse drag from zoom (we handle rotation separately)
      }
      return true; // In 2D, allow everything (pan + zoom)
    })
    .on('zoom',ev=>{
      S.scale=ev.transform.k;
      if(S.view==='2d'){
        g.attr('transform',ev.transform);
        lblG.attr('transform',ev.transform);
        renderLbl();
      } else {
        proj.scale(Math.min(W,H)/2.3*ev.transform.k);
        updAll();
      }
      document.getElementById('stZ').textContent=S.scale.toFixed(1)+'x';
    });
  svg.call(zoomB);

  /* 3D globe rotation via pointer events (does NOT conflict with zoom) */
  const svgNode=svg.node();
  svgNode.addEventListener('pointerdown',ev=>{
    if(S.view!=='3d')return;
    if(ev.pointerType==='touch'){ /* Only single touch rotates */ }
    rotDrag={x:ev.clientX,y:ev.clientY};rotStart=[...proj.rotate()];
    svgNode.setPointerCapture(ev.pointerId);
  });
  svgNode.addEventListener('pointermove',ev=>{
    if(!rotDrag||S.view!=='3d')return;
    const dx=ev.clientX-rotDrag.x,dy=ev.clientY-rotDrag.y,s=.35;
    const nr=[rotStart[0]+dx*s,Math.max(-90,Math.min(90,rotStart[1]-dy*s)),0];
    S.rot=nr;proj.rotate(nr);updAll();
  });
  svgNode.addEventListener('pointerup',()=>{rotDrag=null;});
  svgNode.addEventListener('pointercancel',()=>{rotDrag=null;});

  /* Coord display */
  svg.on('mousemove',ev=>{
    const[x,y]=d3.pointer(ev);let co;
    if(S.view==='2d'){const t=d3.zoomTransform(svg.node());co=proj.invert([(x-t.x)/t.k,(y-t.y)/t.k]);}
    else co=proj.invert([x,y]);
    if(co)document.getElementById('coordD').textContent=`${Math.abs(co[1].toFixed(2))}°${co[1]>=0?'N':'S'}, ${Math.abs(co[0].toFixed(2))}°${co[0]>=0?'E':'W'}`;
  });
}

function updAll(){
  g.selectAll('.country-path').attr('d',path);
  g.select('.graticule').attr('d',path);g.select('.globe-outline').attr('d',path);g.select('.sphere').attr('d',path);
  renderLbl();
  g.selectAll('.cap-d,.cap-l,.anno-marker,.disp-c').each(function(){
    const el=d3.select(this),co=[+el.attr('data-lng'),+el.attr('data-lat')],p=proj(co);
    if(!p)return;
    if(S.view==='3d'){const dd=d3.geoDistance(co,[-proj.rotate()[0],-proj.rotate()[1]]);el.style('display',dd>Math.PI/2?'none':'block');}
    if(this.tagName==='circle')el.attr('cx',p[0]).attr('cy',p[1]);
    else if(this.tagName==='text')el.attr('x',p[0]+4).attr('y',p[1]+3);
  });
}

/* ═══════ VIEW SWITCH ═══════ */
function setView(v){
  S.view=v;
  document.getElementById('btn3d').classList.toggle('active',v==='3d');
  document.getElementById('btn2d').classList.toggle('active',v==='2d');
  svg.call(zoomB.transform,d3.zoomIdentity);S.scale=1;g.attr('transform',null);lblG.attr('transform',null);
  if(v==='3d'){proj=d3.geoOrthographic().scale(Math.min(W,H)/2.3).translate([W/2,H/2]).rotate(S.rot).clipAngle(90);g.select('.sphere').style('display','block');g.select('.globe-outline').style('display','block');}
  else{proj=d3.geoNaturalEarth1().scale(Math.min(W,H)/3.5).translate([W/2,H/2]);g.select('.sphere').style('display','none');g.select('.globe-outline').style('display','none');}
  path=d3.geoPath().projection(proj);renderC();renderLbl();
  if(S.layers.capitals)renderCaps();if(S.layers.disputes)showDisp();
  document.getElementById('stZ').textContent='1.0x';
}

/* ═══════ SELECT COUNTRY ═══════ */
async function selC(d,el){
  g.selectAll('.country-path').classed('selected',false);d3.select(el).classed('selected',true);S.sel=d.id;
  const p=document.getElementById('cPanel');p.classList.add('vis');
  if(isMobile()){document.getElementById('sidebar').classList.add('open');document.getElementById('sidebarOv').classList.add('open');}
  const nz=ZH[d.id]||`#${d.id}`,ne=EN[d.id]||`#${d.id}`;
  document.getElementById('cName').textContent=S.lang==='zh'?nz:ne;
  document.getElementById('cNameSub').textContent=S.lang==='zh'?ne:nz;
  ['sGDP','sPop','sArea'].forEach(x=>document.getElementById(x).textContent='...');
  document.getElementById('sReg').textContent='...';
  document.getElementById('bInfo').innerHTML=`<div class="api-ld"><div class="api-sp"></div>${I[S.lang].ldApi}</div>`;
  if(S.view==='3d'){const ct=d3.geoCentroid(d),tr=[-ct[0],-ct[1],0],cr=proj.rotate();d3.transition().duration(600).tween('r',()=>{const r=d3.interpolate(cr,tr);return t=>{proj.rotate(r(t));S.rot=r(t);updAll();};});}
  const a3=N2A[d.id];let api=null;if(a3)try{const r=await fetch(`https://restcountries.com/v3.1/alpha/${a3}?fields=name,capital,currencies,languages,flag,population,area,region,subregion,timezones,borders`);if(r.ok){api=await r.json();S.apiC[a3]=api;}}catch(e){}
  if(api){
    document.getElementById('cFlag').textContent=api.flag||'🏳️';
    document.getElementById('sPop').textContent=fN(api.population);
    document.getElementById('sArea').textContent=fN(api.area);
    document.getElementById('sReg').textContent=S.lang==='zh'?rZ(api.region):(api.subregion||api.region||'—');
    document.getElementById('sGDP').textContent='—';
    const cap=api.capital?api.capital.join(', '):'—';
    const cur=api.currencies?Object.values(api.currencies).map(c=>c.name+(c.symbol?' ('+c.symbol+')':'')).join(', '):'—';
    const lng=api.languages?Object.values(api.languages).join(', '):'—';
    const tz=api.timezones?api.timezones.slice(0,3).join(', ')+(api.timezones.length>3?' …':''):'—';
    const brd=api.borders&&api.borders.length?api.borders.join(', '):(S.lang==='zh'?'岛国/无陆上邻国':'Island/None');
    document.getElementById('bInfo').innerHTML=`<div style="font-size:10px;color:var(--t2);line-height:1.8">
      <div><span style="color:var(--t3)">${I[S.lang].capital}:</span> ${cap}</div>
      <div><span style="color:var(--t3)">${I[S.lang].currencies}:</span> ${cur}</div>
      <div><span style="color:var(--t3)">${I[S.lang].languages}:</span> ${lng}</div>
      <div><span style="color:var(--t3)">${I[S.lang].timezones}:</span> ${tz}</div>
      <div><span style="color:var(--t3)">${S.lang==='zh'?'邻国':'Borders'}:</span> ${brd}</div></div>`;
  } else {
    document.getElementById('cFlag').textContent='🏳️';['sGDP','sPop','sArea'].forEach(x=>document.getElementById(x).textContent='—');document.getElementById('sReg').textContent='—';
    document.getElementById('bInfo').innerHTML=`<div style="font-size:9px;color:var(--t3)">API不可用</div>`;
  }
  const od=OD[d.id];
  if(od){rBars('exBars',od.ex,'ef');rBars('imBars',od.im,'if');rDip(od.dp);}
  else{document.getElementById('exBars').innerHTML=`<div style="font-size:9px;color:var(--t3);padding:3px 0">${I[S.lang].noData}</div>`;document.getElementById('imBars').innerHTML='';document.getElementById('dpTags').innerHTML='';}
}

function fN(n){if(!n&&n!==0)return'—';if(n>=1e9)return(n/1e9).toFixed(2)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return''+n;}
function rZ(r){return{'Africa':'非洲','Americas':'美洲','Asia':'亚洲','Europe':'欧洲','Oceania':'大洋洲'}[r]||r||'—';}
function rBars(id,items,fc){document.getElementById(id).innerHTML=items.map(i=>`<div class="tbar"><div class="tbar-l">${S.lang==='zh'?i.n:i.e}</div><div class="tbar-t"><div class="tbar-f ${fc}" style="width:${i.p*2.5}%"></div></div><div class="tbar-p">${i.p}%</div></div>`).join('');}
function rDip(rels){document.getElementById('dpTags').innerHTML=rels.map(r=>`<div class="dtag ${r.t}">${S.lang==='zh'?r.c:r.e}</div>`).join('');}

function showTip(ev,d){const t=document.getElementById('ttip'),nm=S.lang==='zh'?(ZH[d.id]||'?'):(EN[d.id]||'?');t.innerHTML=`<div class="tn">${nm}</div><div class="td">${S.lang==='zh'?'点击查看':'Click for info'}</div>`;t.style.display='block';t.style.left=Math.min(ev.offsetX+12,W-160)+'px';t.style.top=(ev.offsetY-8)+'px';}
function hideTip(){document.getElementById('ttip').style.display='none';}

function toggleTool(t){if(S.tool===t){S.tool=null;document.getElementById(t+'Btn').classList.remove('active');document.body.style.cursor='';}else{S.tool=t;document.getElementById(t+'Btn').classList.add('active');document.body.style.cursor='crosshair';}}

/* ═══════ LAYERS ═══════ */
function toggleLayer(l){S.layers[l]=!S.layers[l];const b=document.getElementById('layer'+l[0].toUpperCase()+l.slice(1));if(b)b.classList.toggle('active',S.layers[l]);if(l==='graticule')g.select('.graticule').style('display',S.layers.graticule?'block':'none');if(l==='capitals'){S.layers.capitals?renderCaps():g.selectAll('.cap-d,.cap-l').remove();}if(l==='disputes'){S.layers.disputes?showDisp():(g.selectAll('.disp-c').remove(),document.getElementById('mLeg').style.display='none');}}

const CAPS=[{z:'北京',e:'Beijing',a:39.9,o:116.4},{z:'华盛顿',e:'Washington',a:38.9,o:-77},{z:'莫斯科',e:'Moscow',a:55.75,o:37.6},{z:'伦敦',e:'London',a:51.5,o:-.12},{z:'东京',e:'Tokyo',a:35.7,o:139.7},{z:'新德里',e:'New Delhi',a:28.6,o:77.2},{z:'巴黎',e:'Paris',a:48.85,o:2.35},{z:'柏林',e:'Berlin',a:52.52,o:13.4},{z:'堪培拉',e:'Canberra',a:-35.3,o:149.1},{z:'巴西利亚',e:'Brasília',a:-15.8,o:-47.9},{z:'利雅得',e:'Riyadh',a:24.7,o:46.7},{z:'首尔',e:'Seoul',a:37.57,o:127},{z:'渥太华',e:'Ottawa',a:45.4,o:-75.7},{z:'墨西哥城',e:'Mexico City',a:19.4,o:-99.1},{z:'雅加达',e:'Jakarta',a:-6.2,o:106.85},{z:'开罗',e:'Cairo',a:30.05,o:31.25},{z:'安卡拉',e:'Ankara',a:39.93,o:32.85},{z:'新加坡',e:'Singapore',a:1.35,o:103.8},{z:'河内',e:'Hanoi',a:21.03,o:105.85},{z:'曼谷',e:'Bangkok',a:13.75,o:100.5},{z:'马德里',e:'Madrid',a:40.42,o:-3.7},{z:'罗马',e:'Rome',a:41.9,o:12.5},{z:'基辅',e:'Kyiv',a:50.45,o:30.5},{z:'华沙',e:'Warsaw',a:52.23,o:21},{z:'德黑兰',e:'Tehran',a:35.7,o:51.4},{z:'内罗毕',e:'Nairobi',a:-1.3,o:36.8},{z:'布宜诺斯',e:'B. Aires',a:-34.6,o:-58.4}];
function renderCaps(){g.selectAll('.cap-d,.cap-l').remove();CAPS.forEach(c=>{const co=[c.o,c.a],p=proj(co);if(!p)return;if(S.view==='3d'&&d3.geoDistance(co,[-proj.rotate()[0],-proj.rotate()[1]])>Math.PI/2)return;g.append('circle').attr('class','cap-d').attr('cx',p[0]).attr('cy',p[1]).attr('r',2).attr('fill','#f59e0b').attr('stroke','#000').attr('stroke-width',.4).attr('data-lat',c.a).attr('data-lng',c.o);g.append('text').attr('class','cap-l').attr('x',p[0]+4).attr('y',p[1]+3).attr('fill','#fbbf24').attr('font-size','7px').attr('font-family',"'Noto Sans SC',sans-serif").attr('data-lat',c.a).attr('data-lng',c.o).text(S.lang==='zh'?c.z:c.e);});}
function showDisp(){g.selectAll('.disp-c').remove();[{a:34.5,o:76.5,r:10},{a:12,o:114,r:13},{a:33.1,o:35.8,r:4},{a:45,o:34,r:7},{a:24.5,o:-13,r:9},{a:24,o:119.5,r:6}].forEach(d=>{const p=proj([d.o,d.a]);if(!p)return;g.append('circle').attr('class','disp-c').attr('cx',p[0]).attr('cy',p[1]).attr('r',d.r).attr('fill','rgba(239,68,68,.1)').attr('stroke','rgba(239,68,68,.45)').attr('stroke-width',.8).attr('stroke-dasharray','3,2').attr('data-lat',d.a).attr('data-lng',d.o);});document.getElementById('mLeg').style.display='block';document.getElementById('legC').innerHTML=`<div class="mleg-i"><div class="mleg-d" style="background:var(--ad);opacity:.5"></div>${S.lang==='zh'?'争议区域':'Disputed'}</div>`;}

/* ═══════ ANALYSIS ═══════ */
function toggleAnalysis(t){if(S.ana===t){S.ana=null;g.selectAll('.country-path').style('fill',null);document.getElementById('mLeg').style.display='none';return;}S.ana=t;({gdp:showGDP,alliance:showAlliance,trade:showTrade,military:showMil})[t]();}
const GT={'840':5,'156':5,'392':4,'276':4,'826':4,'356':4,'250':4,'380':3,'124':3,'076':3,'410':3,'036':3,'643':3,'484':2,'360':2,'682':2,'792':2,'528':2,'756':2,'752':2,'616':2,'566':2,'764':2,'784':2,'056':2,'724':2};
const GC=['#1a2744','#1a3a4a','#1a5050','#0d7a5f','#00d4aa','#00ffcc'];
function showGDP(){g.selectAll('.country-path').each(function(){d3.select(this).style('fill',GC[GT[d3.select(this).attr('data-id')]||0]);});sL('GDP',[{c:GC[5],l:'>$15T'},{c:GC[4],l:'$3-15T'},{c:GC[3],l:'$1-3T'},{c:GC[2],l:'$0.5-1T'}]);}
const MT={'840':5,'643':4,'156':4,'356':3,'826':3,'250':3,'392':3,'410':2,'792':2,'276':2,'036':2,'076':2,'380':2,'818':2,'682':2,'586':2,'364':2};
const MC=['#1a2744','#2a1a44','#3a1a55','#5a1a77','#8b5cf6','#a78bfa'];
function showMil(){g.selectAll('.country-path').each(function(){d3.select(this).style('fill',MC[MT[d3.select(this).attr('data-id')]||0]);});sL(S.lang==='zh'?'军事实力':'Military',[{c:MC[5],l:S.lang==='zh'?'超级大国':'Super'},{c:MC[4],l:S.lang==='zh'?'强国':'Major'},{c:MC[3],l:S.lang==='zh'?'区域':'Regional'},{c:MC[2],l:S.lang==='zh'?'中等':'Medium'}]);}
function showAlliance(){const n=new Set(['840','124','826','250','276','380','616','792','578','208','056','528','724','620','300','348','203','233','428','440','191','100','642','703','705']),b=new Set(['076','643','356','156','710','818','364','784','231']);g.selectAll('.country-path').each(function(){const e=d3.select(this),id=e.attr('data-id');e.style('fill',n.has(id)?'rgba(14,165,233,.4)':b.has(id)?'rgba(239,68,68,.4)':'#1a2744');});sL(S.lang==='zh'?'同盟':'Alliances',[{c:'rgba(14,165,233,.6)',l:'NATO'},{c:'rgba(239,68,68,.6)',l:'BRICS+'}]);}
function showTrade(){const hi=new Set(['156','840','276','392','826','250','528','410','380','124','484','356']),md=new Set(['076','036','682','702','764','792','360','458','616','752','056','784','704','566','608']);g.selectAll('.country-path').each(function(){const e=d3.select(this),id=e.attr('data-id');e.style('fill',hi.has(id)?'rgba(0,212,170,.5)':md.has(id)?'rgba(0,212,170,.25)':'#1a2744');});sL(S.lang==='zh'?'贸易':'Trade',[{c:'rgba(0,212,170,.5)',l:S.lang==='zh'?'主要':'Major'},{c:'rgba(0,212,170,.25)',l:S.lang==='zh'?'重要':'Signif.'}]);}
function sL(t,items){document.getElementById('mLeg').style.display='block';document.querySelector('.mleg-t').textContent=t;document.getElementById('legC').innerHTML=items.map(i=>`<div class="mleg-i"><div class="mleg-d" style="background:${i.c}"></div>${i.l}</div>`).join('');}

/* ═══════ ANNOTATIONS ═══════ */
let pA=null;
function showAI(ev){const[x,y]=d3.pointer(ev);let co;if(S.view==='2d'){const t=d3.zoomTransform(svg.node());co=proj.invert([(x-t.x)/t.k,(y-t.y)/t.k]);}else co=proj.invert([x,y]);if(!co)return;pA={lat:co[1],lng:co[0]};const ov=document.getElementById('aOv');ov.style.display='block';ov.style.left=Math.min(ev.offsetX+8,W-230)+'px';ov.style.top=Math.min(ev.offsetY-8,H-150)+'px';document.getElementById('aTxt').value='';document.getElementById('aTxt').focus();}
function cancelA(){document.getElementById('aOv').style.display='none';pA=null;}
function saveA(){const t=document.getElementById('aTxt').value.trim(),tp=document.getElementById('aTp').value;if(!t||!pA)return;S.annos.push({id:Date.now(),lat:pA.lat,lng:pA.lng,text:t,type:tp,time:new Date().toLocaleString()});sAS();renderAM();updAUI();cancelA();}
function renderAM(){g.selectAll('.anno-marker').remove();const cs={strategic:'#ef4444',economic:'#f59e0b',risk:'#f97316',note:'#00d4aa'};S.annos.forEach(a=>{const p=proj([a.lng,a.lat]);if(!p)return;g.append('circle').attr('class','anno-marker').attr('cx',p[0]).attr('cy',p[1]).attr('r',5).attr('fill',cs[a.type]||'#00d4aa').attr('stroke','#fff').attr('stroke-width',1.5).attr('data-lat',a.lat).attr('data-lng',a.lng).style('cursor','pointer').on('mouseover',function(ev){const tt=document.getElementById('ttip');tt.innerHTML=`<div class="tn">${a.text}</div><div class="td">${a.time}</div>`;tt.style.display='block';tt.style.left=(ev.offsetX+12)+'px';tt.style.top=(ev.offsetY-8)+'px';}).on('mouseout',hideTip);});}
function updAUI(){const li=document.getElementById('aList'),btn=document.getElementById('clrBtn'),ic={strategic:'🎯',economic:'💰',risk:'⚠️',note:'📝'};if(!S.annos.length){li.innerHTML=`<div style="text-align:center;color:var(--t3);font-size:9px;padding:12px 0">${I[S.lang].noAnnotations}</div>`;btn.style.display='none';}else{btn.style.display='block';li.innerHTML=S.annos.map(a=>`<div class="aitem"><div class="atxt">${a.text}</div><div class="atype">${ic[a.type]||'📝'}</div><button class="adel" onclick="delA(${a.id})">×</button></div>`).join('');}document.getElementById('stA').textContent=S.annos.length;}
function delA(id){S.annos=S.annos.filter(a=>a.id!==id);sAS();renderAM();updAUI();}
function clearAnnos(){if(!confirm(S.lang==='zh'?'确定清除所有标注？':'Clear all?'))return;S.annos=[];sAS();renderAM();updAUI();}
function sAS(){try{window.storage&&window.storage.set('gs4-a',JSON.stringify(S.annos));}catch(e){}}
function lAS(){try{window.storage&&window.storage.get('gs4-a').then(r=>{if(r&&r.value){S.annos=JSON.parse(r.value);renderAM();updAUI();}}).catch(()=>{});}catch(e){}}

/* ═══════ ZOOM BUTTONS ═══════ */
function doZoom(k){svg.transition().duration(200).call(zoomB.scaleBy,k);}
function resetV(){S.rot=[0,-20,0];if(S.view==='3d')proj.rotate(S.rot);svg.transition().duration(350).call(zoomB.transform,d3.zoomIdentity);S.scale=1;g.attr('transform',null);lblG.attr('transform',null);if(S.view==='3d'){proj.scale(Math.min(W,H)/2.3);updAll();}else renderLbl();document.getElementById('stZ').textContent='1.0x';}

/* ═══════ SEARCH ═══════ */
function setupSearch(){const inp=document.getElementById('searchInput');inp.addEventListener('input',function(){const q=this.value.trim().toLowerCase();if(!q)return;for(const[id,nm]of Object.entries(ZH)){if(nm.includes(q)||(EN[id]||'').toLowerCase().includes(q)){const el=g.select(`[data-id="${id}"]`);if(!el.empty()){selC(el.datum(),el.node());this.blur();return;}}}});inp.addEventListener('keydown',function(e){if(e.key==='Enter')this.dispatchEvent(new Event('input'));});}

/* ═══════ RESIZE ═══════ */
window.addEventListener('resize',()=>{const c=document.getElementById('mapC');W=c.clientWidth;H=c.clientHeight;svg.attr('width',W).attr('height',H);proj.translate([W/2,H/2]);if(S.view==='3d')proj.scale(Math.min(W,H)/2.3*S.scale);else proj.scale(Math.min(W,H)/3.5);path=d3.geoPath().projection(proj);if(S.ct){renderC();renderLbl();}});

/* ═══════ BOOT ═══════ */
window.addEventListener('DOMContentLoaded',()=>{initMap();lAS();});
</script>
